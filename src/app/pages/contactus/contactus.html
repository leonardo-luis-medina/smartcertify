<div class="container contact-us-container">
    <h2>Contact Us</h2>
    <p class="contact-subtitle">
        We'd love to hear from you! Reach out to us using the form below.
    </p>

    <div class="row">

        <!-- Contact Form -->
        <div class="col-lg-6">
            <form class="contact-form">

                <div class="mb-3">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Your Email</label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" placeholder="Enter subject">
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" placeholder="Enter your message"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Send Message
                </button>

            </form>
        </div>

        <!-- Contact Details -->
        <div class="col-lg-6">
            <div class="contact-details">

                <div class="contact-info">
                    <h4>Address</h4>
                    <p>Contact by email</p>
                </div>

                <div class="contact-info">
                    <h4>Phone</h4>
                    <p>+1 234 567 890</p>
                </div>

                <div class="contact-info">
                    <h4>Email</h4>
                    <p>learnsmartcoding@gmail.com</p>
                </div>

                <div class="social-media">
                    <h4>Follow Us</h4>

                    <a href="https://www.youtube.com/@learnsmartcoding">YouTube</a><br>
                    <a href="https://x.com/lsc_karthik">Twitter</a><br>
                    <a href="https://www.linkedin.com/in/learnsmartcoding/">LinkedIn</a><br>
                    <a href="https://www.instagram.com/learnsmartcoding/">Instagram</a><br>
                    <a href="https://github.com/learnsmartcoding">GitHub</a>

                </div>

            </div>
        </div>

    </div>
</div>
