<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand" href="#">SmartCertify</a>

    <!-- Mobile toggle -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar -->
    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- Left menu -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/home']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >Home</a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/user-exams']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >User Exams</a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/courses']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >Courses</a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/videos']"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >Videos</a>
        </li>

        <!-- Update profile -->
        <li class="nav-item" *ngIf="loginDisplay">
          <a
            class="nav-link"
            [routerLink]="['/user/update-profile']"
            routerLinkActive="router-link-active"
          >
            Update Profile
          </a>
        </li>

        <!-- Admin -->
        @if(this.isAdmin){
        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/admin/question/list']"
            routerLinkActive="active"
          >View Questions</a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/admin/question/create']"
            routerLinkActive="active"
          >Create Question</a>
        </li>
        }

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/about']"
            routerLinkActive="active"
          >About</a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link"
            [routerLink]="['/contact-us']"
            routerLinkActive="active"
          >Contact Us</a>
        </li>

      </ul>

      <!-- Search -->
      <form class="d-flex me-3">
        <input
          class="form-control me-2"
          type="search"
          placeholder="Search courses"
          aria-label="Search"
        />
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>

      <!-- Login / Logout -->
      <ul class="navbar-nav">

        <li class="nav-item d-flex align-items-center">

          <!-- Profile image -->
          <img
            *ngIf="profilePictureUrl; else defaultAvatar"
            [src]="profilePictureUrl"
            alt="Profile Picture"
            (click)="loginRedirect()"
            class="rounded-circle"
            style="width:40px;height:40px;object-fit:cover;cursor:pointer"
          />

          <!-- Default avatar -->
          <ng-template #defaultAvatar>
            <a *ngIf="loginDisplay" title="Profile">
              <i class="fa fa-user nav-link"></i>
            </a>
          </ng-template>

          <!-- Login -->
          <a
            class="nav-link"
            *ngIf="!loginDisplay"
            (click)="loginRedirect()"
          >
            Login
          </a>

          <!-- Logout -->
          <a
            class="nav-link"
            *ngIf="loginDisplay"
            (click)="logout()"
          >
            Logout
          </a>

        </li>

      </ul>

    </div>
  </div>
</nav>
